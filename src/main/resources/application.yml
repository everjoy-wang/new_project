server:
  port: 8080

spring:
  application:
    name: ai-gateway-platform
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
  rabbitmq:
    host: localhost
    port: 5672
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
